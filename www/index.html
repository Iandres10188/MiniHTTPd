<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniHTTPd</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>MiniHTTPd</h1>
    <p>Servidor HTTP/1.1 minimo escrito en C, con epoll y conexiones persistentes.</p>
    <img src="image.png" alt="Logo MiniHTTPd" width="120" height="120">
    <ul>
      <li>Sirve archivos estaticos (HTML, CSS, imagenes)</li>
      <li>Metodo GET con analisis de encabezados basicos</li>
      <li>Multiples clientes mediante epoll</li>
      <li>Codigos de estado y tipos MIME</li>
    </ul>
  </main>
</body>
</html>
